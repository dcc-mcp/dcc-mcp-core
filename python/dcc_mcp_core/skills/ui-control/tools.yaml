tools:
  - name: snapshot
    description: >-
      Capture a bounded ui_control snapshot from the scoped application window.
      Start here before UI actions; use the returned snapshot_id when acting so
      stale controls can be detected. On Windows, an adapter/operator-bound
      PID/HWND starts the visible DCC UI Control session and captures a bounded
      target-window image even when raw input is disabled. Bind the
      DCC through DCC_MCP_UI_CONTROL_UIA_PROCESS_ID or
      DCC_MCP_UI_CONTROL_UIA_WINDOW_HANDLE; request scope can only narrow it. A
      locked, disconnected, or secure Windows desktop returns
      desktop_unavailable without ending the logical session. After unlock,
      discard old ids and take a fresh snapshot to restore the capsule.
      Coordinates belong only to this adapter host and DCC logon session;
      RDP/session or monitor topology, resolution, and DPI changes require a
      fresh snapshot. A bounded target may span monitors whose virtual-desktop
      origins are negative or whose DPI differs; action coordinates remain
      PNG-relative.
    input_schema:
      type: object
      properties:
        session_id:
          type: string
          description: "ui_control session id. Defaults to 'default'."
        process_id:
          type: integer
          description: "Process id that owns the scoped application window."
        window_handle:
          type: integer
          description: "Native handle of the scoped application window."
        window_title:
          type: string
          description: "Title substring for the scoped application window."
        process_name:
          type: string
          description: "Process name used to resolve the scoped application window."
        resume_computer_use:
          type: boolean
          default: false
          description: >-
            Explicitly resume native DCC UI Control after the user stopped an
            session with Esc. Agents must leave this false unless the user asks to
            resume control.
        policy:
          type: object
          description: "Optional ui_control policy override for this call."
    read_only: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false
    execution: sync
    affinity: any
    source_file: scripts/snapshot.py
    requires_in_process: true
    next-tools:
      on-success:
        - ui_control__find
        - ui_control__act
        - ui_control__stop_computer_use

  - name: find
    description: >-
      Locate controls in the scoped ui_control snapshot by query, role, label, or
      object name. Returns normalized UiControlNode matches. Live Windows UIA
      pauses with desktop_unavailable while the desktop is locked,
      disconnected, or secure.
    input_schema:
      type: object
      properties:
        session_id:
          type: string
          description: "ui_control session id. Defaults to 'default'."
        process_id:
          type: integer
          description: "Process id that owns the scoped application window."
        window_handle:
          type: integer
          description: "Native handle of the scoped application window."
        window_title:
          type: string
          description: "Title substring for the scoped application window."
        process_name:
          type: string
          description: "Process name used to resolve the scoped application window."
        query:
          type: string
          description: "Text query matched against id, label, text, value, and object_name."
        role:
          type: string
          description: "Control role filter, for example button, text_field, checkbox, or label."
        label:
          type: string
          description: "Exact or case-insensitive label filter."
        object_name:
          type: string
          description: "Host object/control name filter."
        limit:
          type: integer
          description: "Maximum matches to return."
          default: 10
        policy:
          type: object
          description: "Optional ui_control policy override for this call."
    read_only: true
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
    execution: sync
    affinity: any
    timeout_hint_secs: 2
    source_file: scripts/find.py
    requires_in_process: true
    next-tools:
      on-success:
        - ui_control__act
        - ui_control__wait_for

  - name: act
    description: >-
      Perform one scoped semantic or DCC UI Control action. Supports control ids,
      snapshot coordinates, pointer paths, text, and key presses where the
      selected backend supports them. Raw input is denied by default policy.
      Every Windows mutation requires an adapter/operator-bound PID/HWND so
      the visible capsule and user interruption monitor cover semantic UIA as
      well as raw input. Raw input additionally requires
      DCC_MCP_COMPUTER_USE_ALLOW_RAW_INPUT=true.
      Windows hard-denies raw type: enter non-sensitive text only through
      semantic set_text with an exact control_id. Passwords, authentication
      codes, and other credential material require a user hand-off or a
      host-owned secure credential flow. The type action is backend-specific
      to mock/CDP and is not a portable Windows action.
      Windows keypress rejects ordinary printable, Shift-text, and AltGr-text
      input; use only navigation/control/function keys or genuine Ctrl/Alt
      shortcuts.
      For a custom-drawn DCC canvas or face control that has no semantic node,
      use a path from the latest snapshot for one drag; Ctrl, Shift, and Alt in
      keys are held as pointer modifiers. Snapshot again immediately afterward.
      get_window_state, restore_window, show_window, and activate_window are
      recovery operations for the same host-bound PID/HWND and do not require
      a prior snapshot. They cannot enumerate or target another process/window;
      restore/show/activate invalidate any prior snapshot and are audited.
      desktop_unavailable means no Windows UI input was sent; keep the logical
      session, stop issuing UI calls, and ask the user to unlock or reconnect.
      Take a fresh snapshot only after that happens. Never
      use coordinates from the gateway, another host, or another logon session.
    input_schema:
      type: object
      required: [action]
      properties:
        session_id:
          type: string
          description: "ui_control session id. Defaults to 'default'."
        process_id:
          type: integer
          description: "Process id that owns the scoped application window."
        window_handle:
          type: integer
          description: "Native handle of the scoped application window."
        window_title:
          type: string
          description: "Title substring for the scoped application window."
        process_name:
          type: string
          description: "Process name used to resolve the scoped application window."
        control_id:
          type: string
          description: "Optional control id returned by ui_control__snapshot or ui_control__find."
        action:
          type: string
          enum:
            - click
            - move
            - double_click
            - scroll
            - drag
            - raw_coordinate_click
            - type
            - keypress
            - set_text
            - toggle
            - set_checked
            - select_option
            - focus
            - keyboard_shortcut
            - get_window_state
            - restore_window
            - show_window
            - activate_window
          description: >-
            Action kind to perform. type is backend-specific to mock/CDP and
            is hard denied by the Windows backend; use semantic set_text with
            an exact control_id for non-sensitive Windows text entry. Windows
            keypress cannot synthesize ordinary printable text.
        intent:
          type: string
          enum:
            - observe
            - activate
            - navigate
            - ordinary_edit
            - login_or_permission
            - upload
            - move_or_rename
            - transmit_sensitive_data
            - delete_or_overwrite
            - install_or_execute_download
            - financial_transaction
            - account_or_access_change
            - external_communication
            - terminal_or_run_dialog
            - credential_or_authentication
            - windows_security_or_privacy
            - safety_bypass
            - password_change
            - escape_scope
          description: >-
            Consequence classification hint. It can only raise the native host
            policy tier; host UIA/target/input classification remains authoritative.
        text:
          type: string
          maxLength: 4096
          description: >-
            Non-sensitive text for semantic set_text with an exact control_id,
            or backend-specific mock/CDP type. Windows hard-denies raw type;
            passwords and authentication data require secure user/host hand-off.
        checked:
          type: boolean
          description: "Explicit checked state for set_checked."
        x:
          type: number
          description: "Horizontal coordinate in the latest screenshot from this adapter host/session."
        y:
          type: number
          description: "Vertical coordinate in the latest screenshot from this adapter host/session."
        button:
          type: string
          description: "Mouse button, such as left, middle, or right."
        scroll_x:
          type: integer
          minimum: -2147483648
          maximum: 2147483647
          description: "Horizontal wheel delta; positive scrolls right and negative scrolls left."
        scroll_y:
          type: integer
          minimum: -2147483648
          maximum: 2147483647
          description: "Vertical wheel delta; positive scrolls down and negative scrolls up."
        path:
          type: array
          minItems: 2
          maxItems: 256
          description: >-
            Ordered points from the latest screenshot on this adapter
            host/session. Use for custom-drawn controls only when semantic
            lookup fails; one native action consumes this observation.
          items:
            type: object
            required: [x, y]
            properties:
              x:
                type: number
              y:
                type: number
        keys:
          type: array
          maxItems: 16
          description: >-
            Windows keypress accepts navigation/control/function keys or genuine
            Ctrl/Alt shortcuts; Ctrl/Shift/Alt may also modify pointer actions.
          items:
            type: string
            maxLength: 32
        duration_ms:
          type: integer
          minimum: 0
          maximum: 60000
          description: >-
            Optional drag duration, or visual pointer-effect dwell for a
            non-drag pointer action, in milliseconds.
        snapshot_id:
          type: string
          description: >-
            Snapshot id from observation. A stale semantic control returns
            stale_control; stale native coordinates return stale_observation.
            Display topology, resolution, or DPI changes require a new id.
        policy:
          type: object
          description: "Optional ui_control policy override for this call."
    read_only: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: true
      idempotent_hint: false
      open_world_hint: false
    execution: sync
    affinity: any
    source_file: scripts/act.py
    requires_in_process: true
    next-tools:
      on-success:
        - ui_control__wait_for
        - ui_control__snapshot
        - ui_control__stop_computer_use

  - name: system_operation
    description: >-
      Ensure one named Windows configuration item from an operator-owned UI
      Control system grant. The agent supplies only a non-sensitive operation
      id; registry values and symbolic-link paths are resolved inside the
      native host and never enter tool arguments or the host pipe. Supported
      catalog operations are HKCU registry string or DWORD values and file or
      directory symbolic links. This tool has no shell, command, arbitrary
      registry hive, overwrite, or elevation form. The host reads the grant
      catalog only from DCC_MCP_UI_CONTROL_SYSTEM_GRANTS_FILE at startup; the
      selected grant id comes only from
      DCC_MCP_UI_CONTROL_SYSTEM_GRANT_ID. Restart the host after changing the
      catalog. Every call requires trusted action-time confirmation.
    input_schema:
      type: object
      required: [operation_id]
      additionalProperties: false
      properties:
        session_id:
          type: string
          description: "Logical ui_control correlation id. Defaults to 'default'."
        operation_id:
          type: string
          minLength: 1
          maxLength: 256
          description: >-
            Non-sensitive identifier configured inside the selected operator
            grant. Values, paths, commands, grants, hives, overwrite flags, and
            elevation flags are never accepted from the agent.
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
          properties:
            session_id:
              type: string
            operation_type:
              type: string
            outcome:
              type: string
              enum: [created, updated, unchanged]
            policy_tier:
              type: string
              enum: [action_confirmation]
            host_message:
              type: string
    read_only: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: true
      idempotent_hint: true
      open_world_hint: false
    execution: sync
    affinity: any
    source_file: scripts/system_operation.py
    requires_in_process: true

  - name: stop_computer_use
    description: >-
      Stop the native DCC UI Control session for one ui_control session id, remove
      its visible corner brackets/capsule, release the global input owner, and invalidate
      the latest observation. This remains safe while the desktop is
      unavailable and does not clear a Esc interruption latch.
    input_schema:
      type: object
      properties:
        session_id:
          type: string
          description: "ui_control session id. Defaults to 'default'."
    read_only: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
    execution: sync
    affinity: any
    source_file: scripts/stop_computer_use.py
    requires_in_process: true

  - name: wait_for
    description: >-
      Poll the scoped UI inside one tool call until a condition becomes
      true or times out. Use after ui_control__act before verifying with snapshot.
      A Windows lock, disconnect, or secure desktop pauses live UIA and returns
      desktop_unavailable; do not poll the lock screen.
    input_schema:
      type: object
      required: [condition]
      properties:
        session_id:
          type: string
          description: "ui_control session id. Defaults to 'default'."
        process_id:
          type: integer
          description: "Process id that owns the scoped application window."
        window_handle:
          type: integer
          description: "Native handle of the scoped application window."
        window_title:
          type: string
          description: "Title substring for the scoped application window."
        process_name:
          type: string
          description: "Process name used to resolve the scoped application window."
        condition:
          type: object
          required: [kind]
          properties:
            kind:
              type: string
              enum: [control_exists, control_missing, text_equals, value_equals, checked_equals, enabled, disabled, focused]
            control_id:
              type: string
            query:
              type: string
            role:
              type: string
            label:
              type: string
            text:
              type: string
            value:
              type: string
            checked:
              type: boolean
            timeout_ms:
              type: integer
              default: 5000
              minimum: 0
              maximum: 60000
            interval_ms:
              type: integer
              default: 100
        policy:
          type: object
          description: "Optional ui_control policy override for this call."
    read_only: true
    idempotent: false
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false
    execution: sync
    affinity: any
    timeout_hint_secs: 65
    source_file: scripts/wait_for.py
    requires_in_process: true
    next-tools:
      on-success:
        - ui_control__snapshot
        - ui_control__stop_computer_use
