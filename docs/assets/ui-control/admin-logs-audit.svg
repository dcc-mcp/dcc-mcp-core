<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Consolas, monospace">
  <!-- Background -->
  <rect width="800" height="500" fill="#1e1e2e" rx="8"/>

  <!-- Panel header -->
  <rect x="20" y="20" width="760" height="40" fill="#2d2d42" rx="4"/>
  <rect x="20" y="20" width="760" height="40" fill="#2d2d42" rx="4"/>
  <text x="40" y="46" fill="#e0e0f0" font-size="15" font-weight="bold">Admin Logs</text>
  <text x="700" y="46" fill="#8080a0" font-size="11">Last 5 minutes</text>
  <rect x="20" y="56" width="760" height="2" fill="#3a3a55"/>

  <!-- Column headers -->
  <rect x="20" y="60" width="760" height="28" fill="#252538" rx="0"/>
  <text x="40" y="79" fill="#8080b0" font-size="11" font-weight="bold">TIME</text>
  <text x="180" y="79" fill="#8080b0" font-size="11" font-weight="bold">LEVEL</text>
  <text x="260" y="79" fill="#8080b0" font-size="11" font-weight="bold">EVENT TYPE</text>
  <text x="500" y="79" fill="#8080b0" font-size="11" font-weight="bold">DETAIL</text>

  <!-- Row 1: snapshot -->
  <rect x="20" y="88" width="760" height="32" fill="#2d2d42" rx="0"/>
  <text x="40" y="109" fill="#a0a0c0" font-size="12">10:23:45.123</text>
  <text x="180" y="109" fill="#3498db" font-size="12">INFO</text>
  <text x="260" y="109" fill="#e0e0f0" font-size="12">ui_control_operation</text>
  <text x="500" y="109" fill="#a0a0c0" font-size="12">snapshot | pid:8924 | rect: 1920x1080 → 800x450</text>

  <!-- Row 2: find -->
  <rect x="20" y="120" width="760" height="32" fill="#2b2b3d" rx="0"/>
  <text x="40" y="141" fill="#a0a0c0" font-size="12">10:23:46.012</text>
  <text x="180" y="141" fill="#3498db" font-size="12">INFO</text>
  <text x="260" y="141" fill="#e0e0f0" font-size="12">ui_control_operation</text>
  <text x="500" y="141" fill="#a0a0c0" font-size="12">find | control: "settings" label: "Settings" role: button</text>

  <!-- Row 3: act click -->
  <rect x="20" y="152" width="760" height="32" fill="#2d2d42" rx="0"/>
  <text x="40" y="173" fill="#a0a0c0" font-size="12">10:23:46.523</text>
  <text x="180" y="173" fill="#3498db" font-size="12">INFO</text>
  <text x="260" y="173" fill="#e0e0f0" font-size="12">ui_control_operation</text>
  <text x="500" y="173" fill="#a0a0c0" font-size="12">act | action: click | control: "settings" | intent: navigate</text>

  <!-- Row 4: snapshot after action -->
  <rect x="20" y="184" width="760" height="32" fill="#2b2b3d" rx="0"/>
  <text x="40" y="205" fill="#a0a0c0" font-size="12">10:23:47.102</text>
  <text x="180" y="205" fill="#3498db" font-size="12">INFO</text>
  <text x="260" y="205" fill="#e0e0f0" font-size="12">ui_control_operation</text>
  <text x="500" y="205" fill="#a0a0c0" font-size="12">snapshot | pid:8924 | rect: 1920x1080 → 800x450</text>

  <!-- Row 5: rejected operation -->
  <rect x="20" y="216" width="760" height="32" fill="#2d2d42" rx="0"/>
  <text x="40" y="237" fill="#a0a0c0" font-size="12">10:23:50.341</text>
  <text x="180" y="237" fill="#e74c3c" font-size="12">WARN</text>
  <text x="260" y="237" fill="#e0e0f0" font-size="12">ui_control_operation</text>
  <text x="500" y="237" fill="#a0a0c0" font-size="12">❌ keypress | reason: policy_disabled (raw input denied)</text>

  <!-- Row 6: stop -->
  <rect x="20" y="248" width="760" height="32" fill="#2b2b3d" rx="0"/>
  <text x="40" y="269" fill="#a0a0c0" font-size="12">10:23:55.887</text>
  <text x="180" y="269" fill="#f39c12" font-size="12">INFO</text>
  <text x="260" y="269" fill="#e0e0f0" font-size="12">ui_control_operation</text>
  <text x="500" y="269" fill="#a0a0c0" font-size="12">stop | reason: user_interrupted | cleanup_pending: false</text>

  <!-- Redaction indicator -->
  <rect x="20" y="290" width="760" height="40" fill="#1a1a2e" rx="3" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="40" y="316" fill="#8080a0" font-size="11">* All ui_control_operation events have coordinates, entered text, and screenshot data redacted automatically.</text>

  <!-- Caption -->
  <text x="400" y="480" fill="#8080a0" font-size="12" text-anchor="middle">Admin Logs 面板：脱敏后的 ui_control_operation 审计事件</text>
</svg>
