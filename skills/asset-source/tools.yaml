tools:
  - name: search_assets
    description: "Search the asset catalog and return matching AssetDescriptor entries."
    source_file: scripts/search_assets.py
    execution: sync
    affinity: any
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
          description: Search query (asset name, id, or keyword).
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
          description: Maximum number of results to return.
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: true
    call_examples:
      - arguments:
          query: "table"
          limit: 5
        note: "Search for table assets, return up to 5 results"
      - arguments:
          query: "chair"
        note: "Search for chair assets with default limit"
