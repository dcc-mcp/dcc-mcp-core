name: Sync ClawHub Skills

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "Git ref to publish from, such as a release tag"
        required: false
        type: string
        default: ""
      publish:
        description: "Publish to ClawHub instead of dry-running"
        required: false
        type: boolean
        default: false
    secrets:
      CLAWHUB_TOKEN:
        required: false
  pull_request:
    branches:
      - main
    paths:
      - "skills/**"
      - "scripts/package_openclaw_skill.py"
      - "scripts/clawhub_sync.py"
      - ".github/clawhub-skills.json"
      - ".github/workflows/clawhub.yml"
      - "justfile"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to ClawHub instead of dry-running"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: clawhub-skills-${{ github.ref }}
  cancel-in-progress: false

env:
  CLAWHUB_CLI_PACKAGE: clawhub@0.23.1
  CLAWHUB_CONFIG_PATH: .clawhub/config.json
  CLAWHUB_DISABLE_TELEMETRY: "1"

jobs:
  sync-skills:
    name: Package and sync skills to ClawHub
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Remove pre-installed Rust component shims
        run: rm -f ~/.cargo/bin/cargo-clippy ~/.cargo/bin/cargo-fmt || true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dcc-mcp-core (for validate_skill / parse_skill_md)
        run: pip install -e .

      - name: Package ClawHub skill archives
        run: python scripts/package_openclaw_skill.py .github/clawhub-skills.json dist/skills --manifest

      - name: Upload packaged skill artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawhub-skill-packages
          path: dist/skills/*.zip
          if-no-files-found: error

      - name: Require ClawHub token
        if: inputs.publish
        shell: bash
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [[ -z "${CLAWHUB_TOKEN}" ]]; then
            echo "Missing CLAWHUB_TOKEN repository secret" >&2
            exit 1
          fi

      - name: Login to ClawHub
        if: inputs.publish
        shell: bash
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          mkdir -p "$(dirname "$CLAWHUB_CONFIG_PATH")"
          npx "$CLAWHUB_CLI_PACKAGE" --no-input login --token "$CLAWHUB_TOKEN" --no-browser

      - name: Dry-run ClawHub publish
        if: ${{ !inputs.publish }}
        run: python scripts/clawhub_sync.py --dry-run

      - name: Publish skills to ClawHub
        if: inputs.publish
        run: python scripts/clawhub_sync.py
