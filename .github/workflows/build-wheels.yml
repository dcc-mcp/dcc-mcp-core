name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      checkout-ref:
        description: "Git ref to build, for example v0.15.4"
        required: false
        type: string
        default: ""
      release-tag-name:
        description: "Release tag to upload wheels to GitHub Release (e.g. v0.18.11). Empty means skip upload."
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      test-wheel:
        required: false
        type: string
        default: 'true'
      checkout-ref:
        required: false
        type: string
        default: ""
      release-tag-name:
        description: "Release tag to upload wheels to GitHub Release (e.g. v0.18.11). Empty means skip upload."
        required: false
        type: string
        default: ""

concurrency:
  # Scope by the resolved checkout target so a release-driven build for tag
  # vX.Y.Z is never grouped with (and never cancelled by) another run for a
  # different ref. Falls back to github.ref when no checkout-ref is provided.
  group: build-wheels-${{ inputs.checkout-ref || github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── ABI3 builds (Python 3.8+) — one wheel works for all 3.8+ ──

  linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: x86_64
          python-version: '3.11'
          artifact-name: wheels-linux-x86_64
      - name: Verify wheel tag is abi3
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *cp38-abi3* ]]; then
            echo "::error::Expected cp38-abi3 wheel tag, got: $wheel"
            exit 1
          fi
          echo "OK: abi3 wheel tag confirmed"
      - name: Upload wheel to GitHub Release
        if: inputs.release-tag-name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag-name }}
          files: dist/*.whl

  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: x64
          python-version: '3.11'
          # --find-interpreter can pick up a non-abi3 Python on Windows,
          # silently downgrading the wheel tag from cp38-abi3 to cp37.
          # Build without it so the abi3-py38 feature in WHEEL_FEATURES
          # (justfile) produces the correct tag.  (PIP-2508)
          maturin-extra-args: ''
          artifact-name: wheels-windows-x64
      - name: Verify wheel tag is abi3
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *cp38-abi3* ]]; then
            echo "::error::Expected cp38-abi3 wheel tag, got: $wheel"
            exit 1
          fi
          echo "OK: abi3 wheel tag confirmed"
      - name: Upload wheel to GitHub Release
        if: inputs.release-tag-name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag-name }}
          files: dist/*.whl

  # ── py37-lite: pure-Python wheel (py3-none-any) for Python 3.7 ──
  # Maya 2022 / Blender 2.83 embed Python 3.7 and cannot load cp38-abi3
  # wheels. scripts/build_py37_pure_wheel.py assembles a py3-none-any wheel
  # from python/dcc_mcp_core without maturin, Rust, or just (just>=1.0 is
  # unavailable on Python 3.7 and previously blocked release PyPI publish).
  py37-lite:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.7"
      - name: Build py37-lite pure-Python wheel
        run: |
          python -m pip install --upgrade pip wheel
          python scripts/build_py37_pure_wheel.py
        shell: bash
      - name: Verify wheel tag is py3-none-any
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *py3-none-any* ]]; then
            echo "::error::Expected py3-none-any wheel tag, got: $wheel"
            exit 1
          fi
          echo "OK: py3-none-any wheel tag confirmed"
      - name: Verify _core extension is NOT present in the wheel
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          # Match compiled extensions only; _core.pyi stub is expected in py37-lite wheels.
          if unzip -l "$wheel" | grep -E '_core\.(so|pyd|dll|dylib)'; then
            echo "::error::py37-lite wheel should not contain compiled _core extension"
            exit 1
          fi
          echo "OK: no compiled _core extension in py37-lite wheel"
      - name: Upload py37-lite wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-py37-lite
          path: dist/
          retention-days: 30
      - name: Upload wheel to GitHub Release
        if: inputs.release-tag-name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag-name }}
          files: dist/*.whl

  macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: universal2-apple-darwin
          python-version: '3.11'
          maturin-extra-args: '--sdist --find-interpreter'
          artifact-name: wheels-macos-universal2
      - name: Verify wheel tag is abi3
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *cp38-abi3* ]]; then
            echo "::error::Expected cp38-abi3 wheel tag, got: $wheel"
            exit 1
          fi
          echo "OK: abi3 wheel tag confirmed"
      - name: Upload wheel to GitHub Release
        if: inputs.release-tag-name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag-name }}
          files: dist/*.whl
