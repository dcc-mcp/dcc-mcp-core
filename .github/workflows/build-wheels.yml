name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      checkout-ref:
        description: "Git ref to build, for example v0.15.4"
        required: false
        type: string
        default: ""
      release-tag-name:
        description: "Release tag to upload wheels to GitHub Release (e.g. v0.18.11). Empty means skip upload."
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      test-wheel:
        required: false
        type: string
        default: 'true'
      checkout-ref:
        required: false
        type: string
        default: ""
      release-tag-name:
        description: "Release tag to upload wheels to GitHub Release (e.g. v0.18.11). Empty means skip upload."
        required: false
        type: string
        default: ""

concurrency:
  # Scope by the resolved checkout target so a release-driven build for tag
  # vX.Y.Z is never grouped with (and never cancelled by) another run for a
  # different ref. Falls back to github.ref when no checkout-ref is provided.
  group: build-wheels-${{ inputs.checkout-ref || github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: read

env:
  PY37_CI_IMAGE: ghcr.io/dcc-mcp/dcc-mcp-py37@sha256:1dd8fba0da3f2a70ce44f55aee7cf08ee3d67768367deb3985a4f70779687ac5
  PY37_WHEEL_FEATURES: python-bindings,ext-module,workflow,scheduler,prometheus,job-persist-sqlite,admin

jobs:
  # ── ABI3 builds (Python 3.8+) — one wheel works for all 3.8+ ──

  admin-ui-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: loonghao/vx@v0.9.11
        with:
          version: "0.9.11"
          cache-key-prefix: "vx-tools-v0.9.7"
      - name: Build admin UI bundle
        shell: bash
        run: scripts/release/prebuild_admin_ui.sh
      - name: Upload admin UI bundle
        uses: actions/upload-artifact@v4
        with:
          name: admin-ui-bundle
          path: crates/dcc-mcp-gateway/src/gateway/admin/generated/index.html

  linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: x86_64
          python-version: '3.11'
          artifact-name: wheels-linux-x86_64
      - name: Verify wheel tag is abi3
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *cp38-abi3* ]]; then
            echo "::error::Expected cp38-abi3 wheel tag, got: $wheel"
            exit 1
          fi
          echo "OK: abi3 wheel tag confirmed"
      - name: Upload wheel to GitHub Release
        if: inputs.release-tag-name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag-name }}
          files: dist/*.whl

  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: x64
          python-version: '3.11'
          # --find-interpreter can pick up a non-abi3 Python on Windows,
          # silently downgrading the wheel tag from cp38-abi3 to cp37.
          # Build without it so the abi3-py38 feature in WHEEL_FEATURES
          # (justfile) produces the correct tag.  (PIP-2508)
          maturin-extra-args: ''
          artifact-name: wheels-windows-x64
      - name: Verify wheel tag is abi3
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *cp38-abi3* ]]; then
            echo "::error::Expected cp38-abi3 wheel tag, got: $wheel"
            exit 1
          fi
          echo "OK: abi3 wheel tag confirmed"
      - name: Upload wheel to GitHub Release
        if: inputs.release-tag-name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag-name }}
          files: dist/*.whl

  # ── Native Linux cp37 wheel for supported Python 3.7 DCC hosts ──
  # Built in the canonical GHCR image pinned by digest. The py37-lite fallback
  # remains tested below, but release uploads must come from this native lane.
  linux-py37:
    runs-on: ubuntu-latest
    needs: [admin-ui-bundle]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - name: Download admin UI bundle
        uses: actions/download-artifact@v8
        with:
          name: admin-ui-bundle
          path: crates/dcc-mcp-gateway/src/gateway/admin/generated
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build native py37 wheel
        run: |
          docker run --rm \
            -v "$PWD:/io" \
            -w /io \
            -e DCC_MCP_ADMIN_UI_PREBUILT=1 \
            -e PY37_WHEEL_FEATURES \
            "$PY37_CI_IMAGE" \
            sh -lc 'maturin build --release --out dist --features "$PY37_WHEEL_FEATURES" -i python3.7'
        shell: bash
      - name: Verify wheel tag is native cp37
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *cp37-cp37m* ]]; then
            echo "::error::Expected native cp37-cp37m wheel tag, got: $wheel"
            exit 1
          fi
          unzip -l "$wheel" | grep -E '_core\..*\.so'
          echo "OK: native cp37 wheel tag and _core extension confirmed"
      - name: Upload native py37 wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-x86_64-py37
          path: dist/
          retention-days: 30
      - name: Upload wheel to GitHub Release
        if: inputs.release-tag-name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag-name }}
          files: dist/*.whl

  py37-lite-fallback:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.7"
      - name: Build py37-lite fallback wheel
        run: |
          python -m pip install --upgrade pip wheel
          python scripts/build_py37_pure_wheel.py
        shell: bash
      - name: Verify fallback wheel has no compiled _core
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *py3-none-any* ]]; then
            echo "::error::Expected py3-none-any fallback wheel tag, got: $wheel"
            exit 1
          fi
          if unzip -l "$wheel" | grep -E '_core\.(so|pyd|dll|dylib)'; then
            echo "::error::py37-lite fallback wheel should not contain compiled _core extension"
            exit 1
          fi
          echo "OK: py37-lite fallback wheel remains pure Python"
      - name: Upload py37-lite fallback wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-py37-lite-fallback
          path: dist/
          retention-days: 30

  macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: universal2-apple-darwin
          python-version: '3.11'
          maturin-extra-args: '--sdist --find-interpreter'
          artifact-name: wheels-macos-universal2
      - name: Verify wheel tag is abi3
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *cp38-abi3* ]]; then
            echo "::error::Expected cp38-abi3 wheel tag, got: $wheel"
            exit 1
          fi
          echo "OK: abi3 wheel tag confirmed"
      - name: Upload wheel to GitHub Release
        if: inputs.release-tag-name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag-name }}
          files: dist/*.whl
