name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      checkout-ref:
        description: "Git ref to build, for example v0.15.4"
        required: false
        type: string
        default: ""
      release-tag-name:
        description: "Release tag to upload wheels to GitHub Release (e.g. v0.18.11). Empty means skip upload."
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      test-wheel:
        required: false
        type: string
        default: 'true'
      checkout-ref:
        required: false
        type: string
        default: ""
      release-tag-name:
        description: "Release tag to upload wheels to GitHub Release (e.g. v0.18.11). Empty means skip upload."
        required: false
        type: string
        default: ""

concurrency:
  # Scope by the resolved checkout target so a release-driven build for tag
  # vX.Y.Z is never grouped with (and never cancelled by) another run for a
  # different ref. Falls back to github.ref when no checkout-ref is provided.
  group: build-wheels-${{ inputs.checkout-ref || github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── ABI3 builds (Python 3.8+) — one wheel works for all 3.8+ ──

  linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: x86_64
          python-version: '3.11'
          artifact-name: wheels-linux-x86_64
      - name: Verify wheel tag is abi3
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *cp38-abi3* ]]; then
            echo "::error::Expected cp38-abi3 wheel tag, got: $wheel"
            exit 1
          fi
          echo "OK: abi3 wheel tag confirmed"
      - name: Upload wheel to GitHub Release
        if: inputs.release-tag-name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag-name }}
          files: dist/*.whl

  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: x64
          python-version: '3.11'
          # --find-interpreter can pick up a non-abi3 Python on Windows,
          # silently downgrading the wheel tag from cp38-abi3 to cp37.
          # Build without it so the abi3-py38 feature in WHEEL_FEATURES
          # (justfile) produces the correct tag.  (PIP-2508)
          maturin-extra-args: ''
          artifact-name: wheels-windows-x64
      - name: Verify wheel tag is abi3
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *cp38-abi3* ]]; then
            echo "::error::Expected cp38-abi3 wheel tag, got: $wheel"
            exit 1
          fi
          echo "OK: abi3 wheel tag confirmed"
      - name: Upload wheel to GitHub Release
        if: inputs.release-tag-name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag-name }}
          files: dist/*.whl

  # ── py37-lite: pure-Python wheel (py3-none-any) for Python 3.7 ──
  # Maya 2022 / Blender 2.83 embed Python 3.7 and cannot load cp38-abi3
  # wheels. This job produces a pure-Python wheel with zero compiled Rust
  # extensions so users can `pip install dcc-mcp-core` without a Rust toolchain.
  #
  # maturin with --no-default-features -F py37-lite compiles the Rust source
  # tree as an rlib only (no cdylib → no _core extension), and maturin falls
  # back to packaging only the pure-Python sources under python/.
  py37-lite:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.7"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - uses: loonghao/vx@v0.9.11
        with:
          version: "0.9.11"
          cache-key-prefix: "vx-tools-v0.9.7"
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: rust-py37
          shared-key: rust-ubuntu
      - name: Install maturin & just
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin>=1.5,<2.0" "just>=1.0"
        shell: bash
      - name: Build py37-lite pure-Python wheel
        run: just build-py37
        shell: bash
      - name: Verify wheel tag is py3-none-any
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *py3-none-any* ]]; then
            echo "::error::Expected py3-none-any wheel tag, got: $wheel"
            exit 1
          fi
          echo "OK: py3-none-any wheel tag confirmed"
      - name: Verify _core extension is NOT present in the wheel
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          if unzip -l "$wheel" | grep -q "_core"; then
            echo "::error::py37-lite wheel should not contain _core extension, but found:"
            unzip -l "$wheel" | grep "_core"
            exit 1
          fi
          echo "OK: no _core extension in py37-lite wheel"
      - name: Upload wheel to GitHub Release
        if: inputs.release-tag-name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag-name }}
          files: dist/*.whl

  macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: universal2-apple-darwin
          python-version: '3.11'
          maturin-extra-args: '--sdist --find-interpreter'
          artifact-name: wheels-macos-universal2
      - name: Verify wheel tag is abi3
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -1)
          echo "Built wheel: $wheel"
          if [[ "$wheel" != *cp38-abi3* ]]; then
            echo "::error::Expected cp38-abi3 wheel tag, got: $wheel"
            exit 1
          fi
          echo "OK: abi3 wheel tag confirmed"
      - name: Upload wheel to GitHub Release
        if: inputs.release-tag-name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag-name }}
          files: dist/*.whl
