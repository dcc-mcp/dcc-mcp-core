# DCC-MCP Public Catalog
# Built-in index for DCC adapter discovery and bootstrap planning.
#
# This catalog contains first-party adapters, infrastructure entries, and remote
# connectors. Skill pack install metadata lives in the official marketplace.json
# at dcc-mcp/marketplace and is managed by the `marketplace` subcommand.
#
# Schema version: "1"
# Fields:
#   name        - Unique package / adapter name (required)
#   description - Human-readable description (required)
#   dcc         - DCC target(s): maya, blender, houdini, photoshop, ... (list)
#   url         - Canonical URL (GitHub repo, docs, PyPI, ...) (optional)
#   tags        - Searchable tags (list, optional)
#   install.python_path      - Optional host Python interpreter for package install
#   install.instructions_url - Raw adapter-maintained install.md for agent setup

version: "1"
entries:
  - name: "dcc-mcp-core"
    description: "Foundational Rust + Python library for the DCC-MCP ecosystem"
    dcc: []
    url: "https://github.com/dcc-mcp/dcc-mcp-core"
    tags: ["core", "official", "rust", "python", "library"]

  - name: "dcc-mcp-maya"
    description: "Core Maya adapter for DCC-MCP — gateway-managed instance, mayapy-based MCP server"
